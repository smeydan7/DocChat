services:
  db:
    image: pgvector/pgvector:pg16
    container_name: docchat-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docchat}
      POSTGRES_USER: ${POSTGRES_USER:-docchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docchat}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docchat} -d ${POSTGRES_DB:-docchat}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: docchat-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: docchat-frontend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pg_data:
